<style>
:root {
  --bg:#0b0b12; --surface:#13131e; --card:#1c1c2a; --card2:#222233;
  --border:#2d2d42; --accent:#f0b429; --accent2:#7c3aed; --text:#e8e8f2;
  --muted:#6b6b8a; --green:#10b981; --red:#ef4444; --blue:#60a5fa;
  --s-bank:#1e3a5f; --s-nbfc:#1e3a5f; --s-ins:#1e3a5f;
  --s-it:#0d3320; --s-tech:#0d3320;
  --s-fmcg:#3b1f00; --s-cons:#3b1f00;
  --s-auto:#1a0a2e; --s-mfg:#1a0a2e;
  --s-pharma:#002a2a; --s-health:#002a2a;
  --s-energy:#2a1500; --s-power:#2a1500; --s-infra:#2a1500;
  --s-metal:#1a1a00; --s-cement:#1a1a00; --s-chem:#1a1a00;
  --s-telecom:#001a2a; --s-media:#001a2a;
  --s-realty:#1a001a; --s-hotel:#1a001a;
  --s-defence:#001a00;
  --s-agri:#001a0a;
  --s-exchange:#1a1a2a;
  --s-retail:#2a0a0a;
  --s-misc:#1a1a1a;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
 
/* HEADER */
header{
  background:linear-gradient(135deg,#0b0b12 0%,#13131e 60%,#1a0b30 100%);
  border-bottom:1px solid var(--border);padding:20px 28px;
  position:sticky;top:0;z-index:200;backdrop-filter:blur(20px);
  display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
}
.logo-wrap{display:flex;align-items:baseline;gap:10px;}
.logo-main{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;color:var(--accent);letter-spacing:2px;}
.logo-badge{background:var(--accent2);color:#fff;font-size:.65rem;font-weight:600;padding:2px 8px;border-radius:20px;letter-spacing:1px;align-self:center;}
.header-stats{display:flex;gap:20px;align-items:center;}
.stat-pill{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:.8rem;color:var(--muted);}
.stat-pill span{color:var(--accent);font-weight:600;}
 
/* SEARCH + CONTROLS */
.controls{background:var(--surface);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;position:sticky;top:73px;z-index:190;}
.search-wrap{position:relative;flex:1;min-width:200px;max-width:380px;}
.search-wrap input{
  width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:10px 14px 10px 38px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;
  transition:border-color .2s;
}
.search-wrap input:focus{border-color:var(--accent);}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:1rem;}
.count-badge{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:.85rem;color:var(--muted);white-space:nowrap;}
.count-badge b{color:var(--accent);}
 
/* SECTOR FILTERS */
.filters{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 28px;display:flex;gap:8px;flex-wrap:wrap;position:sticky;top:125px;z-index:180;}
.filter-btn{
  background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:5px 14px;font-size:.78rem;font-family:'DM Sans',sans-serif;color:var(--muted);
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.filter-btn:hover{border-color:var(--accent);color:var(--text);}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600;}
 
/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;padding:24px 28px;max-width:1600px;margin:0 auto;}
 
/* COMPANY CARD */
.company-card{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  cursor:pointer;transition:all .25s;overflow:hidden;
}
.company-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 32px rgba(240,180,41,.1);}
.company-card.expanded{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent);}
 
.card-header{padding:18px 20px 14px;display:flex;align-items:flex-start;gap:14px;}
.card-icon{font-size:2rem;width:48px;height:48px;display:flex;align-items:center;justify-content:center;border-radius:12px;flex-shrink:0;}
.card-meta{flex:1;min-width:0;}
.card-name{font-size:1rem;font-weight:600;color:var(--text);margin-bottom:2px;}
.card-ticker{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--accent);letter-spacing:1px;}
.card-sector{display:inline-block;font-size:.7rem;padding:2px 8px;border-radius:10px;margin-top:4px;color:var(--muted);border:1px solid var(--border);}
.card-oneliner{padding:0 20px 14px;font-size:.85rem;color:var(--muted);line-height:1.5;}
 
/* MINI FLOW */
.mini-flow{padding:10px 20px 14px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.flow-step{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:.72rem;color:var(--text);white-space:nowrap;}
.flow-arrow{color:var(--muted);font-size:.8rem;}
.flow-step.final{background:rgba(240,180,41,.12);border-color:rgba(240,180,41,.3);color:var(--accent);font-weight:600;}
 
/* EXPAND TOGGLE */
.card-toggle{padding:10px 20px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:6px;font-size:.78rem;color:var(--muted);transition:color .2s;}
.company-card:hover .card-toggle{color:var(--accent);}
.toggle-icon{transition:transform .3s;}
.company-card.expanded .toggle-icon{transform:rotate(180deg);}
 
/* EXPANDED CONTENT */
.card-detail{display:none;border-top:1px solid var(--border);}
.company-card.expanded .card-detail{display:block;}
 
.detail-section{padding:18px 20px;border-bottom:1px solid var(--border);}
.detail-section:last-child{border-bottom:none;}
.detail-title{font-size:.7rem;font-weight:600;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-bottom:12px;}
 
/* FLOW DETAIL */
.flow-items{display:flex;flex-direction:column;gap:8px;}
.flow-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 14px;}
.flow-item.highlight{background:rgba(240,180,41,.06);border-color:rgba(240,180,41,.25);}
.flow-item-text{font-size:.85rem;font-weight:500;color:var(--text);}
.flow-item-sub{font-size:.75rem;color:var(--muted);margin-top:3px;}
 
/* MOATS */
.moats-grid{display:flex;flex-direction:column;gap:8px;}
.moat{display:flex;gap:12px;align-items:flex-start;background:var(--surface);border-radius:8px;padding:10px 14px;}
.moat-icon{font-size:1.2rem;flex-shrink:0;margin-top:1px;}
.moat-title{font-size:.82rem;font-weight:600;color:var(--text);}
.moat-text{font-size:.75rem;color:var(--muted);margin-top:2px;line-height:1.4;}
 
/* CUSTOMERS */
.customers-wrap{display:flex;flex-wrap:wrap;gap:8px;}
.customer-pill{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:.75rem;display:flex;align-items:center;gap:6px;}
 
/* STRATEGIES */
.strategies{display:flex;flex-direction:column;gap:8px;}
.strategy{background:var(--surface);border-left:3px solid var(--accent2);border-radius:0 8px 8px 0;padding:10px 14px;}
.strategy-title{font-size:.82rem;font-weight:600;color:var(--text);}
.strategy-desc{font-size:.75rem;color:var(--muted);margin-top:3px;line-height:1.4;}
 
/* EMPTY STATE */
.empty{text-align:center;padding:80px 20px;color:var(--muted);}
.empty-icon{font-size:3rem;margin-bottom:16px;}
 
/* FOOTER */
footer{text-align:center;padding:40px 20px;color:var(--muted);font-size:.8rem;border-top:1px solid var(--border);margin-top:20px;}
 
/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent);color:#000;padding:10px 20px;border-radius:20px;font-size:.85rem;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;z-index:999;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
 
@media(max-width:600px){
  header{padding:14px 16px;}
  .controls,.filters{padding:10px 16px;top:auto;position:relative;}
  .grid{padding:16px;gap:12px;}
  .logo-main{font-size:1.5rem;}
}
</style>
</head>

// APP ENGINE
// ═══════════════════════════════════════════════
const SECTORS = [...new Set(C.map(c=>c.s))].sort();
 
function buildFilters(){
  const f = document.getElementById('filters');
  f.innerHTML = `<button class="filter-btn active" onclick="filter('ALL',this)">All (${C.length})</button>`;
  SECTORS.forEach(s=>{
    const count = C.filter(x=>x.s===s).length;
    f.innerHTML += `<button class="filter-btn" onclick="filter('${s}',this)">${s} (${count})</button>`;
  });
  document.getElementById('totalCount').textContent = C.length;
  document.getElementById('sectorCount').textContent = SECTORS.length;
  document.getElementById('visibleCount').textContent = C.length;
}
 
function filter(sector, btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const cards = document.querySelectorAll('.company-card');
  let v=0;
  cards.forEach(card=>{
    const show = sector==='ALL' || card.dataset.sector===sector;
    card.style.display = show?'':'none';
    card.classList.remove('expanded');
    if(show) v++;
  });
  document.getElementById('visibleCount').textContent = v;
}
 
function buildCards(){
  const grid = document.getElementById('grid');
  grid.innerHTML = C.map((co,i)=>`
    <div class="company-card" data-sector="${co.s}" data-name="${co.n.toLowerCase()}" data-ticker="${co.t.toLowerCase()}" onclick="toggleCard(this)">
      <div class="card-header">
        <div class="card-icon" style="background:${co.sc}20;border:1px solid ${co.sc}30">${co.i}</div>
        <div class="card-meta">
          <div class="card-name">${co.n}</div>
          <div class="card-ticker">NSE: ${co.t}</div>
          <div class="card-sector">${co.s}</div>
        </div>
      </div>
      <div class="card-oneliner">${co.o}</div>
      <div class="mini-flow">
        ${co.fm.map((s,i)=>`
          ${i>0?'<span class="flow-arrow">→</span>':''}
          <span class="flow-step ${i===co.fm.length-1?'final':''}">${s}</span>
        `).join('')}
      </div>
      <div class="card-toggle">
        <span>View Details</span>
        <span class="toggle-icon">▼</span>
      </div>
      <div class="card-detail">
        <div class="detail-section">
          <div class="detail-title">Revenue Flow</div>
          <div class="flow-items">
            ${co.fd.map(f=>`
              <div class="flow-item ${f.h?'highlight':''}">
                <div class="flow-item-text">${f.t}</div>
                <div class="flow-item-sub">${f.u}</div>
              </div>
            `).join('')}
          </div>
        </div>
        <div class="detail-section">
          <div class="detail-title">Competitive Moats</div>
          <div class="moats-grid">
            ${co.m.map(m=>`
              <div class="moat">
                <div class="moat-icon">${m.i}</div>
                <div>
                  <div class="moat-title">${m.t}</div>
                  <div class="moat-text">${m.x}</div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
        <div class="detail-section">
          <div class="detail-title">Customer Segments</div>
          <div class="customers-wrap">
            ${co.c.map(c=>`<div class="customer-pill">${c.i} ${c.l}</div>`).join('')}
          </div>
        </div>
        <div class="detail-section">
          <div class="detail-title">Strategy Shifts</div>
          <div class="strategies">
            ${co.st.map(s=>`
              <div class="strategy">
                <div class="strategy-title">${s.t}</div>
                <div class="strategy-desc">${s.d}</div>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
    </div>
  `).join('');
}
 
function toggleCard(card){
  const isOpen = card.classList.contains('expanded');
  document.querySelectorAll('.company-card.expanded').forEach(c=>c.classList.remove('expanded'));
  if(!isOpen){
    card.classList.add('expanded');
    setTimeout(()=>card.scrollIntoView({behavior:'smooth',block:'start'}),100);
  }
}
 
// SEARCH
document.getElementById('searchInput').addEventListener('input',function(){
  const q = this.value.toLowerCase().trim();
  const cards = document.querySelectorAll('.company-card');
  let v=0;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.filter-btn').classList.add('active');
  cards.forEach(card=>{
    const match = !q || card.dataset.name.includes(q) || card.dataset.ticker.includes(q) || card.dataset.sector.toLowerCase().includes(q);
    card.style.display = match?'':'none';
    card.classList.remove('expanded');
    if(match) v++;
  });
  document.getElementById('visibleCount').textContent = v;
});
 
buildFilters();
buildCards();
</script>
